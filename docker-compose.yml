version: '3.8'

services:
  db:
    image: postgres:15
    container_name: booking-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: booking
    ports:
      - "5432:5432"

  app:
    build: .
    container_name: booking-app
    ports:
      - "8080:8080"
    depends_on:
      - db